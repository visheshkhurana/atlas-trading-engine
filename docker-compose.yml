# ATLAS — Docker Compose for local / VPS deployment
# Usage:
#   cp .env.local.example .env
#   # fill in your API keys in .env
#   docker compose up -d
#   docker compose logs -f atlas-engine

version: "3.9"

services:
  atlas-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: atlas-engine
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - PAPER_MODE=true
      - LOOP_INTERVAL=5
      - VOL_PAUSE=0.06
      - MAX_DAILY_TRADES=20
      - MAX_POS_PCT=0.03
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "python", "-c", "import sys; sys.exit(0)"]
      interval: 30s
      timeout: 5s
      retries: 3
